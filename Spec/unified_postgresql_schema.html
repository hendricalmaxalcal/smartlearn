
<div style="padding:0 0 16px">
<h2 style="font-size:16px;font-weight:500;margin:0 0 4px;color:var(--color-text-primary)">Unified PostgreSQL schema — all features, one database</h2>
<p style="font-size:12px;color:var(--color-text-secondary);margin:0 0 14px">JSONB columns replace MongoDB; pg arrays replace Redis lists. ~20 tables cover every feature.</p>
<div id="erd"></div>
</div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme:dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad:false, theme:'base',
  fontFamily:'"Anthropic Sans",sans-serif',
  themeVariables:{
    darkMode:dark, fontSize:'12px',
    fontFamily:'"Anthropic Sans",sans-serif',
    lineColor: dark?'#9c9a92':'#73726c',
    textColor: dark?'#c2c0b6':'#3d3d3a',
  }
});

const erd = `erDiagram

  USERS {
    uuid id PK
    string full_name
    string email
    string password_hash
    enum role "student|teacher|admin"
    string avatar_url
    enum form_level "form1..form6"
    enum stream "arts|science|business"
    boolean is_verified
    timestamp created_at
  }

  SUBSCRIPTION_PLANS {
    uuid id PK
    string name
    decimal price
    string currency
    int duration_days
    jsonb features "array of feature keys"
  }

  SUBSCRIPTIONS {
    uuid id PK
    uuid user_id FK
    uuid plan_id FK
    string payment_ref
    enum status "active|expired|cancelled"
    timestamp starts_at
    timestamp ends_at
  }

  COURSES {
    uuid id PK
    uuid teacher_id FK
    string title
    string slug
    text description
    enum form_level
    enum stream
    boolean is_premium
    string thumbnail_url
    boolean is_published
    timestamp created_at
  }

  CHAPTERS {
    uuid id PK
    uuid course_id FK
    string title
    int order_index
    boolean is_free_preview
  }

  RESOURCES {
    uuid id PK
    uuid chapter_id FK
    enum type "video|pdf|note|slide"
    string title
    string file_url
    int duration_sec
    int order_index
  }

  ENROLLMENTS {
    uuid id PK
    uuid user_id FK
    uuid course_id FK
    timestamp enrolled_at
    timestamp expires_at
  }

  COURSE_PROGRESS {
    uuid id PK
    uuid user_id FK
    uuid resource_id FK
    boolean completed
    int last_position_sec
    timestamp updated_at
  }

  QUIZZES {
    uuid id PK
    uuid course_id FK
    string title
    int pass_score
    jsonb questions "array of question objects"
  }

  QUIZ_ATTEMPTS {
    uuid id PK
    uuid user_id FK
    uuid quiz_id FK
    int score
    jsonb answers
    timestamp taken_at
  }

  POSTS {
    uuid id PK
    uuid user_id FK
    text content
    text[] media_urls
    text[] tags
    int likes_count
    timestamp created_at
  }

  POST_LIKES {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    timestamp created_at
  }

  COMMENTS {
    uuid id PK
    uuid post_id FK
    uuid user_id FK
    text content
    int likes_count
    timestamp created_at
  }

  STUDY_GROUPS {
    uuid id PK
    string name
    text description
    uuid owner_id FK
    text[] member_ids
    enum form_level
    enum stream
    boolean is_private
    timestamp created_at
  }

  CONVERSATIONS {
    uuid id PK
    enum type "dm|group"
    uuid[] participant_ids
    timestamp updated_at
  }

  MESSAGES {
    uuid id PK
    uuid conversation_id FK
    uuid sender_id FK
    text content
    string media_url
    uuid[] read_by
    timestamp sent_at
  }

  EVENTS {
    uuid id PK
    string title
    text description
    uuid organizer_id FK
    timestamp event_date
    string location
    boolean is_online
    uuid[] attendee_ids
    timestamp created_at
  }

  NOTIFICATIONS {
    uuid id PK
    uuid user_id FK
    enum type "message|like|event|announcement"
    string title
    text body
    jsonb meta
    boolean is_read
    timestamp created_at
  }

  USERS ||--o{ SUBSCRIPTIONS : has
  USERS ||--o{ ENROLLMENTS : has
  USERS ||--o{ COURSE_PROGRESS : tracks
  USERS ||--o{ QUIZ_ATTEMPTS : takes
  USERS ||--o{ POSTS : writes
  USERS ||--o{ COMMENTS : writes
  USERS ||--o{ MESSAGES : sends
  USERS ||--o{ NOTIFICATIONS : receives
  SUBSCRIPTION_PLANS ||--o{ SUBSCRIPTIONS : defines
  COURSES ||--o{ ENROLLMENTS : gets
  COURSES ||--o{ CHAPTERS : has
  COURSES ||--o{ QUIZZES : has
  CHAPTERS ||--o{ RESOURCES : has
  RESOURCES ||--o{ COURSE_PROGRESS : tracked-by
  QUIZZES ||--o{ QUIZ_ATTEMPTS : gets
  POSTS ||--o{ COMMENTS : has
  POSTS ||--o{ POST_LIKES : gets
  CONVERSATIONS ||--o{ MESSAGES : contains
`;

const { svg } = await mermaid.render('erd-svg', erd);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs=[nums[0],nums[2],nums[4],nums[6]], ys=[nums[1],nums[3],nums[5],nums[7]];
  const x=Math.min(...xs),y=Math.min(...ys),w=Math.max(...xs)-x,h=Math.max(...ys)-y;
  const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x',x); rect.setAttribute('y',y);
  rect.setAttribute('width',w); rect.setAttribute('height',h);
  rect.setAttribute('rx','8');
  for(const a of ['fill','stroke','stroke-width','class','style'])
    if(firstPath.hasAttribute(a)) rect.setAttribute(a,firstPath.getAttribute(a));
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p=>p.setAttribute('stroke','none'));
</script>
